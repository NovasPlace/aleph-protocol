version: '3.8'

services:
  nodeus-engine:
    build: .
    container_name: nodeus_engine
    restart: unless-stopped
    ports:
      # Bind strictly to localhost. Nodeus Engines must be proxied via HTTPS securely.
      - "127.0.0.1:8801:8801"
    volumes:
      - ./data:/home/aleph/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
